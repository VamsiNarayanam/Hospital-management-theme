<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Page not found — Stackly Hospital Management hospital management platform, Bangalore, India.">
  <meta name="theme-color" content="#0B1A2B">
  <title>404 — Stackly Hospital Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="stylesheet" href="css/healthcare.css">
</head>
<body class="page-inner page-error page-hero-overlay premium-theme">

  <div id="preloader" aria-hidden="true">
    <div class="preloader__stage">
      <div class="preloader__ring" aria-hidden="true"><span class="preloader__ring-arc"></span></div>
      <img class="preloader__logo" src="images/stackly-healthcare.webp" alt="Stackly Hospital Management" width="220" height="48" decoding="async">
      <div class="preloader__progress" role="progressbar" aria-label="Loading" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span class="preloader__progress-fill"></span>
      </div>
      <p class="preloader__tagline" data-boot-messages="Locating care route…|Checking secure links…|Preparing fallback care path…">Locating care route…</p>
    </div>
  </div>

  <main class="site-main">
    <section class="error-page error-page--premium" aria-labelledby="error-title">
      <div class="error-page__bg" aria-hidden="true">
        <img src="images/error-bg.svg" alt="" width="1920" height="1080" decoding="async">
      </div>
      <div class="container error-page__container">
        <div class="error-page__card glass-card">
          <p class="error-page__code" aria-hidden="true">404</p>
          <h1 id="error-title">This page isn't in our hospital system.</h1>
          <p class="lead">The page you're looking for may have moved, been archived, or the link may be incorrect. Let's get you back to familiar ground.</p>
          <div class="error-page__actions">
            <button type="button" class="btn btn--outline-light" id="error-go-back" data-go-back>Go back</button>
            <a class="btn btn--primary" href="index.html">Back to home</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
