<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Page not found — Stackly Hospital Management hospital management platform, Bangalore, India.">
  <meta name="theme-color" content="#F4F7FB">
  <title>404 — Stackly Hospital Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@500;600&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="stylesheet" href="css/healthcare.css">
  <link rel="stylesheet" href="css/light-theme.css">
</head>
<body class="page-inner page-error premium-theme theme-light">

  <main class="site-main">
    <section class="error-page error-page--split" aria-labelledby="error-title">
      <div class="error-page__visual" aria-hidden="true">
        <img src="images/care-hub.webp" alt="" width="1200" height="900" decoding="async">
        <div class="error-page__visual-overlay"></div>
        <p class="error-page__visual-code">404</p>
        <p class="error-page__visual-tag">Route not found</p>
      </div>

      <div class="error-page__panel">
        <a class="error-page__logo" href="index.html">
          <img src="images/stackly-healthcare.webp" alt="Stackly Hospital Management" width="200" height="44" decoding="async">
        </a>

        <div class="error-page__panel-inner">
          <p class="section__kicker">Page not found</p>
          <h1 id="error-title">This page isn't in our hospital system.</h1>
          <p class="error-page__lead">The link may be broken, outdated, or the page may have moved. Use the options below to get back on track.</p>

          <div class="error-page__actions">
            <a class="btn btn--primary" href="index.html">Back to home</a>
            <button type="button" class="btn btn--outline-dark" id="error-go-back" data-go-back>Go back</button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
